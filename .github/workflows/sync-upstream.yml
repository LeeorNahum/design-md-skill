name: Sync upstream spec

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - id: sync
        run: node scripts/sync.mjs

      - name: Commit on change
        run: |
          if [[ -n "$(git status --porcelain references/spec.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add references/spec.md
            git commit -m "Sync DESIGN.md spec from upstream @ ${{ steps.sync.outputs.upstream_sha }}"
            git push
          else
            echo "No spec changes."
          fi
